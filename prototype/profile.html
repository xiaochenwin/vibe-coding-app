<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-shadow {
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .tab-bar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
        }
        .stats-card {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }
        .achievement-badge {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
        }
        .profile-avatar {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="flex flex-col h-screen">
        <!-- 头部用户信息 -->
        <div class="gradient-bg text-white p-6 pb-8">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-2xl font-bold">个人中心</h1>
                <button class="p-2">
                    <i class="fas fa-cog text-white text-xl"></i>
                </button>
            </div>
            
            <!-- 用户头像和信息 -->
            <div class="flex items-center mb-6">
                <div class="w-20 h-20 profile-avatar rounded-full flex items-center justify-center mr-4">
                    <i class="fas fa-user text-white text-2xl"></i>
                </div>
                <div class="flex-1">
                    <h2 class="text-xl font-bold mb-1">学习者</h2>
                    <p class="text-blue-100 text-sm mb-2">Vibe Coding 爱好者</p>
                    <div class="flex items-center">
                        <div class="bg-white bg-opacity-20 rounded-full px-3 py-1">
                            <span class="text-xs font-medium">Lv.5 进阶学习者</span>
                        </div>
                    </div>
                </div>
                <button class="bg-white bg-opacity-20 rounded-xl px-4 py-2">
                    <span class="text-sm font-medium">编辑</span>
                </button>
            </div>
            
            <!-- 学习进度 -->
            <div class="bg-white bg-opacity-10 rounded-2xl p-4 backdrop-blur-sm">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm text-blue-100">总体进度</span>
                    <span class="text-sm font-bold">5/13 章节</span>
                </div>
                <div class="w-full bg-white bg-opacity-20 rounded-full h-2">
                    <div class="bg-white h-2 rounded-full" style="width: 38%"></div>
                </div>
                <p class="text-xs text-blue-100 mt-2">继续努力，距离完成还有8个章节！</p>
            </div>
        </div>

        <!-- 统计数据 -->
        <div class="p-6">
            <h3 class="text-lg font-bold text-gray-800 mb-4">📊 学习统计</h3>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white rounded-2xl p-4 card-shadow">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-2xl font-bold text-gray-800">24</p>
                            <p class="text-sm text-gray-500">学习小时</p>
                        </div>
                        <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-clock text-blue-600"></i>
                        </div>
                    </div>
                </div>
                
                <div class="bg-white rounded-2xl p-4 card-shadow">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-2xl font-bold text-gray-800">7</p>
                            <p class="text-sm text-gray-500">连续天数</p>
                        </div>
                        <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-fire text-orange-600"></i>
                        </div>
                    </div>
                </div>
                
                <div class="bg-white rounded-2xl p-4 card-shadow">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-2xl font-bold text-gray-800">12</p>
                            <p class="text-sm text-gray-500">获得徽章</p>
                        </div>
                        <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-medal text-yellow-600"></i>
                        </div>
                    </div>
                </div>
                
                <div class="bg-white rounded-2xl p-4 card-shadow">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-2xl font-bold text-gray-800">5</p>
                            <p class="text-sm text-gray-500">完成证书</p>
                        </div>
                        <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-certificate text-green-600"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 快捷功能 -->
        <div class="px-6 pb-6">
            <h3 class="text-lg font-bold text-gray-800 mb-4">🔧 功能设置</h3>
            <div class="space-y-3">
                <!-- 我的证书 -->
                <div class="bg-white rounded-2xl p-4 card-shadow">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center mr-3">
                                <i class="fas fa-award text-yellow-600"></i>
                            </div>
                            <div>
                                <h4 class="font-semibold text-gray-800">我的证书</h4>
                                <p class="text-sm text-gray-500">查看和分享学习证书</p>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-gray-400"></i>
                    </div>
                </div>
                
                <!-- 学习提醒 -->
                <div class="bg-white rounded-2xl p-4 card-shadow">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center mr-3">
                                <i class="fas fa-bell text-blue-600"></i>
                            </div>
                            <div>
                                <h4 class="font-semibold text-gray-800">学习提醒</h4>
                                <p class="text-sm text-gray-500">设置每日学习提醒</p>
                            </div>
                        </div>
                        <div class="flex items-center">
                            <span class="text-sm text-green-600 mr-2">已开启</span>
                            <i class="fas fa-chevron-right text-gray-400"></i>
                        </div>
                    </div>
                </div>
                
                <!-- 阅读设置 -->
                <div class="bg-white rounded-2xl p-4 card-shadow">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center mr-3">
                                <i class="fas fa-font text-purple-600"></i>
                            </div>
                            <div>
                                <h4 class="font-semibold text-gray-800">阅读设置</h4>
                                <p class="text-sm text-gray-500">字体大小、夜间模式等</p>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-gray-400"></i>
                    </div>
                </div>
                
                <!-- 数据同步 -->
                <div class="bg-white rounded-2xl p-4 card-shadow">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center mr-3">
                                <i class="fas fa-sync text-green-600"></i>
                            </div>
                            <div>
                                <h4 class="font-semibold text-gray-800">数据同步</h4>
                                <p class="text-sm text-gray-500">iCloud 自动同步学习进度</p>
                            </div>
                        </div>
                        <div class="flex items-center">
                            <span class="text-sm text-green-600 mr-2">已同步</span>
                            <i class="fas fa-chevron-right text-gray-400"></i>
                        </div>
                    </div>
                </div>
                
                <!-- 关于应用 -->
                <div class="bg-white rounded-2xl p-4 card-shadow">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center mr-3">
                                <i class="fas fa-info-circle text-gray-600"></i>
                            </div>
                            <div>
                                <h4 class="font-semibold text-gray-800">关于应用</h4>
                                <p class="text-sm text-gray-500">版本信息和帮助文档</p>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-gray-400"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 最近成就展示 -->
        <div class="px-6 pb-24">
            <h3 class="text-lg font-bold text-gray-800 mb-4">🏆 最近成就</h3>
            <div class="bg-white rounded-2xl p-4 card-shadow">
                <div class="flex items-center">
                    <div class="w-12 h-12 achievement-badge rounded-full flex items-center justify-center mr-4">
                        <i class="fas fa-fire text-white"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-semibold text-gray-800">连续学习一周</h4>
                        <p class="text-sm text-gray-500">坚持连续学习7天，养成良好习惯！</p>
                        <p class="text-xs text-orange-500 mt-1">2小时前获得</p>
                    </div>
                    <button class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-sm font-medium">
                        分享
                    </button>
                </div>
            </div>
        </div>

        <!-- 底部导航栏 -->
        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 safe-area-bottom">
            <div class="grid grid-cols-4 h-40 py-4">
                <div class="flex flex-col items-center justify-center space-y-2">
                    <i class="fas fa-home text-gray-400 text-2xl"></i>
                    <span class="text-sm text-gray-400">首页</span>
                </div>
                <div class="flex flex-col items-center justify-center space-y-2">
                    <i class="fas fa-book text-gray-400 text-2xl"></i>
                    <span class="text-sm text-gray-400">章节</span>
                </div>
                <div class="flex flex-col items-center justify-center space-y-2">
                    <i class="fas fa-trophy text-gray-400 text-2xl"></i>
                    <span class="text-sm text-gray-400">成就</span>
                </div>
                <div class="flex flex-col items-center justify-center space-y-2">
                    <i class="fas fa-user text-blue-600 text-2xl"></i>
                    <span class="text-sm text-blue-600 font-medium">我的</span>
                </div>
            </div>
        </div>
 
    </div>
</body>
</html>
