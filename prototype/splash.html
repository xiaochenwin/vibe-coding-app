<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding - 启动页面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }
        .logo-animation {
            animation: logoFloat 3s ease-in-out infinite;
        }
        .loading-dots {
            animation: loadingDots 1.5s infinite;
        }
        .fade-in {
            animation: fadeIn 2s ease-in-out;
        }
        .slide-up {
            animation: slideUp 1.5s ease-out 0.5s both;
        }
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes loadingDots {
            0%, 20% { opacity: 0; }
            50% { opacity: 1; }
            80%, 100% { opacity: 0; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(30px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        .pulse-ring {
            animation: pulseRing 2s infinite;
        }
        @keyframes pulseRing {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }
            100% {
                transform: scale(2.4);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="gradient-bg h-screen flex flex-col justify-center items-center text-white overflow-hidden">
    <!-- 背景装饰 -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute top-20 left-10 w-32 h-32 bg-pink-300 bg-opacity-20 rounded-full blur-xl"></div>
        <div class="absolute bottom-32 right-16 w-24 h-24 bg-purple-300 bg-opacity-15 rounded-full blur-lg"></div>
        <div class="absolute top-1/2 left-1/4 w-16 h-16 bg-blue-300 bg-opacity-10 rounded-full blur-md"></div>
        <div class="absolute top-1/3 right-1/4 w-20 h-20 bg-pink-200 bg-opacity-10 rounded-full blur-lg"></div>
        <div class="absolute bottom-1/4 left-1/3 w-12 h-12 bg-purple-200 bg-opacity-15 rounded-full blur-md"></div>
    </div>

    <!-- 主要内容 -->
    <div class="relative z-10 text-center">
        <!-- Logo区域 -->
        <div class="mb-8 fade-in">
            <div class="relative">
                <!-- 脉冲环效果 -->
                <div class="absolute inset-0 w-32 h-32 mx-auto">
                    <div class="w-full h-full bg-white bg-opacity-20 rounded-full pulse-ring"></div>
                </div>
                
                <!-- 主Logo -->
                <div class="w-32 h-32 mx-auto bg-white bg-opacity-20 rounded-full flex items-center justify-center logo-animation backdrop-blur-sm">
                    <div class="w-20 h-20 bg-gradient-to-br from-purple-400 to-pink-400 rounded-full flex items-center justify-center shadow-lg">
                        <i class="fas fa-code text-white text-2xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- App名称 -->
        <div class="mb-4 slide-up">
            <h1 class="text-4xl font-bold mb-2">Vibe Coding</h1>
            <p class="text-xl text-blue-100 font-light">氛围编程 · 沉浸式学习</p>
        </div>

        <!-- 标语 -->
        <div class="mb-12 slide-up">
            <p class="text-lg text-blue-100 opacity-90">在最佳氛围中学习编程</p>
            <p class="text-sm text-blue-200 opacity-75 mt-1">营造专注学习环境，提升编程技能</p>
        </div>

        <!-- 加载指示器 -->
        <div class="slide-up">
            <div class="flex justify-center items-center space-x-2 mb-4">
                <div class="w-2 h-2 bg-white rounded-full loading-dots" style="animation-delay: 0s;"></div>
                <div class="w-2 h-2 bg-white rounded-full loading-dots" style="animation-delay: 0.2s;"></div>
                <div class="w-2 h-2 bg-white rounded-full loading-dots" style="animation-delay: 0.4s;"></div>
            </div>
            <p class="text-sm text-blue-200 opacity-75">正在营造学习氛围...</p>
        </div>
    </div>

    <!-- 底部信息 -->
    <div class="absolute bottom-8 left-0 right-0 text-center slide-up">
        <div class="flex justify-center items-center space-x-4 mb-4">
            <div class="flex items-center space-x-2">
                <i class="fas fa-brain text-blue-200 text-sm"></i>
                <span class="text-xs text-blue-200">沉浸式学习</span>
            </div>
            <div class="w-1 h-1 bg-blue-200 rounded-full opacity-50"></div>
            <div class="flex items-center space-x-2">
                <i class="fas fa-heart text-blue-200 text-sm"></i>
                <span class="text-xs text-blue-200">氛围营造</span>
            </div>
            <div class="w-1 h-1 bg-blue-200 rounded-full opacity-50"></div>
            <div class="flex items-center space-x-2">
                <i class="fas fa-star text-blue-200 text-sm"></i>
                <span class="text-xs text-blue-200">个性化体验</span>
            </div>
        </div>
        <p class="text-xs text-blue-300 opacity-60">Version 1.0.0 | © 2024 Vibe Coding App</p>
    </div>

    <!-- 自动跳转脚本 -->
    <script>
        // 3秒后自动跳转到主页
        setTimeout(function() {
            // 在实际应用中，这里会跳转到主页
            // window.location.href = 'home.html';
            console.log('启动完成，准备进入主页');
        }, 3000);
    </script>
</body>
</html>
